<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Título da aba da página conforme solicitado -->
    <title>Meus sites favoritos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Estilização simples para organizar o conteúdo centralizado */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .site-container {
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 10px auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: transform 0.3s;
        }
        img:hover {
            transform: scale(1.05); /* Efeito visual ao passar o mouse */
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Título principal do corpo da página com o nome do aluno -->
    <h1>Meus sites favoritos: Diogo Henrique</h1>

    <!-- Início da lista de sites favoritos -->

    <!-- Site 1: Netflix -->
    <div class="site-container">
        <!-- Nome do site usando a tag h1 conforme instrução -->
        <h1>Netflix</h1>
        <!-- Imagem como link clicável para o site oficial -->
        <a href="https://www.netflix.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Logo Netflix">
        </a>
        <!-- Link escrito abaixo da imagem -->
        <br>
        <a href="https://www.netflix.com" target="_blank">https://www.netflix.com</a>
    </div>

    <!-- Site 2: ChatGPT -->
    <div class="site-container">
        <!-- Nome do site -->
        <h1>ChatGPT</h1>
        <!-- Imagem como link -->
        <a href="https://chat.openai.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="Logo ChatGPT">
        </a>
        <!-- Link escrito -->
        <br>
        <a href="https://chat.openai.com" target="_blank">https://chat.openai.com</a>
    </div>

    <!-- Site 3: YouTube -->
    <div class="site-container">
        <!-- Nome do site -->
        <h1>YouTube</h1>
        <!-- Imagem como link -->
        <a href="https://www.youtube.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="Logo YouTube">
        </a>
        <!-- Link escrito -->
        <br>
        <a href="https://www.youtube.com" target="_blank">https://www.youtube.com</a>
    </div>

    <!-- Site 4: iLovePDF -->
    <div class="site-container">
        <!-- Nome do site -->
        <h1>iLovePDF</h1>
        <!-- Imagem como link -->
        <a href="https://www.ilovepdf.com" target="_blank">
            <img src="https://www.ilovepdf.com/img/ilovepdf.png" alt="Logo iLovePDF">
        </a>
        <!-- Link escrito -->
        <br>
        <a href="https://www.ilovepdf.com" target="_blank">https://www.ilovepdf.com</a>
    </div>

    <!-- Site 5: Disney+ -->
    <div class="site-container">
        <!-- Nome do site -->
        <h1>Disney+</h1>
        <!-- Imagem como link -->
        <a href="https://www.disneyplus.com" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="Logo Disney+">
        </a>
        <!-- Link escrito -->
        <br>
        <a href="https://www.disneyplus.com" target="_blank">https://www.disneyplus.com</a>
    </div>

    <!-- Rodapé simples -->
    <p>&copy; 2026 - Atividade de Diogo Henrique</p>

</body>
</html>
